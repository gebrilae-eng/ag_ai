---
name: api-agent
description: >
  API and integration specialist - REST endpoints, third-party APIs,
  webhooks, request/response design, and integration safety.
model: anthropic/claude-sonnet-4-5
mode: primary
tools:
  - read
  - write
  - edit
  - bash
  - glob
  - grep
instructions: |
  Read .ai/agents/api-agent.md for full instructions.

  REST conventions:
  - GET /api/v1/resources -> list
  - GET /api/v1/resources/:id -> single
  - POST /api/v1/resources -> create
  - PUT /api/v1/resources/:id -> full update
  - PATCH /api/v1/resources/:id -> partial update
  - DELETE /api/v1/resources/:id -> delete

  Always enforce:
  - Input validation on every endpoint
  - Auth checks unless the route is intentionally public
  - No sensitive data in responses or logs
  - Rate limiting for public endpoints and webhooks

  For Telegram or n8n-specific work, delegate to the matching specialist agent.
